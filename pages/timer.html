<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Together Since ❤️</title>

    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="gallery-page">

<div class="story-card">

    <h1>❤️ Together Since ❤️</h1>

    <div class="counter">

        <div class="count-item">
            <h2 id="years">0</h2>
            <p>YEARS</p>
        </div>

        <div class="arrow">↓</div>

        <div class="count-item">
            <h2 id="months">0</h2>
            <p>MONTHS</p>
        </div>

        <div class="arrow">↓</div>

        <div class="count-item">
            <h2 id="days">0</h2>
            <p>DAYS</p>
        </div>

        <div class="arrow">↓</div>

        <div class="count-item">
            <h2 id="hours">0</h2>
            <p>HOURS</p>
        </div>

        <div class="arrow">↓</div>

        <div class="count-item">
            <h2 id="minutes">0</h2>
            <p>MINUTES</p>
        </div>

        <div class="arrow">↓</div>

        <div class="count-item">
            <h2 id="seconds">0</h2>
            <p>SECONDS</p>
        </div>

    </div>

    <h3 class="love-message">
        ❤️ And Still Counting... ❤️
    </h3>

    <p class="love-text">
        Every second with you is my favorite memory.
    </p>

    <button onclick="location.href='music.html'">
    Continue Our Story ❤️
</button>

</div>

<script src="../js/timer.js"></script>

</body>
</html>
